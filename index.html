<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盈亏看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="diag.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#fff;--border:#e8e8e8;--text:#1a1a2e;--dim:#8c8c8c;--green:#52c41a;--red:#f5222d;--blue:#1890ff;--amber:#faad14;--purple:#722ed1;--grad1:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px;-webkit-tap-highlight-color:transparent}
.h{background:var(--grad1);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.h h1{font-size:17px;font-weight:700}.h .r{display:flex;gap:8px;align-items:center;font-size:12px}
.h select{padding:4px 8px;border:none;border-radius:6px;font-size:12px;background:rgba(255,255,255,.2);color:#fff;cursor:pointer}.h select option{color:#333;background:#fff}
.h .btn{background:rgba(255,255,255,.2);color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.wrap{max-width:900px;margin:0 auto;padding:12px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.crd{background:var(--card);border-radius:12px;padding:14px 10px;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center}.crd .l{font-size:11px;color:var(--dim);margin-bottom:4px}.crd .v{font-size:18px;font-weight:700}
.up{color:var(--red)}.dn{color:var(--green)}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tab{padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;color:var(--dim);background:var(--card);border:1px solid var(--border);white-space:nowrap;flex-shrink:0;transition:all .2s}
.tab:hover{color:var(--text);border-color:var(--blue)}.tab.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(24,144,255,.3)}
.panel{display:none}.panel.on{display:block}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.card-h{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-h h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#fafafa;padding:9px 10px;text-align:left;font-size:11px;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border)}tr:last-child td{border-bottom:none}tr:hover{background:#f9f9fb}
.btn{padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}.bp{background:var(--blue);color:#fff;border-color:var(--blue)}.bp:hover{background:#40a9ff}
.btn-sm{padding:4px 8px;font-size:11px;border-radius:6px}
.rem{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.8}
.rem-green{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border:1px solid #c8e6c9}.rem-amber{background:linear-gradient(135deg,#fff8e1,#fff3e0);border:1px solid #ffe0b2}
.news-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}.news-item:last-child{border-bottom:none}
.news-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:7px}
.news-b{flex:1}.news-t{font-size:13px;font-weight:500;line-height:1.5}.news-m{font-size:11px;color:var(--dim);margin-top:2px}
.hot-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;background:var(--blue);color:#fff}
.hot-tag.r{background:var(--red)}.hot-tag.o{background:var(--amber)}.hot-tag.g{background:var(--green)}
.stock-rec{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.rec-card{background:linear-gradient(135deg,#f5f7fa,#e4e7ed);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.rec-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.rec-n{font-weight:600;font-size:14px}.rec-c{font-size:11px;color:var(--dim)}.rec-r{font-size:12px;margin-top:6px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;width:380px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h3{font-size:16px;margin-bottom:16px;font-weight:600}
.welcome{text-align:center;padding:60px 20px;animation:fadeIn .5s;position:relative;z-index:10}
.welcome h2{font-size:22px;margin-bottom:12px;color:var(--text)}
.welcome p{color:var(--dim);margin-bottom:24px;font-size:14px}
.welcome .big-btn{display:inline-block;background:var(--grad1);color:#fff;padding:14px 32px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;box-shadow:0 4px 16px rgba(102,126,234,.4);transition:all .2s;position:relative;z-index:11}
.welcome .big-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(102,126,234,.5)}
.welcome .steps{text-align:left;max-width:320px;margin:20px auto;font-size:13px;color:var(--dim)}
.welcome .steps div{padding:6px 0}
.fg{margin-bottom:12px}.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:3px;font-weight:600}
.fg input,.fg select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.fg input:focus{border-color:var(--blue)}
.mb{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.chart-card{margin-bottom:12px}
.chart-box{position:relative;height:220px;padding:8px 12px}
.toggle{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;color:var(--dim)}
.toggle .sw{width:36px;height:20px;border-radius:10px;background:#ddd;position:relative;transition:.2s}
.toggle .sw.on{background:var(--blue)}.toggle .sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
.toggle .sw.on::after{left:18px}
.advice-box{background:linear-gradient(135deg,#fffbe6,#fff7e6);border:1px solid #ffe58f;border-radius:12px;padding:14px;margin-bottom:12px}
.advice-box h3{font-size:14px;margin-bottom:8px;color:#d48806}
.advice-item{padding:7px 0;border-bottom:1px solid rgba(250,173,20,.12);font-size:13px}.advice-item:last-child{border-bottom:none}
.ai-box{background:linear-gradient(135deg,#f0f5ff,#e6f0ff);border:1px solid #adc6ff;border-radius:12px;padding:14px;margin-bottom:12px}
.ai-box h3{font-size:14px;margin-bottom:10px;color:#1d39c4;display:flex;align-items:center;gap:6px}
.ai-content{font-size:13px;line-height:1.8;color:#333;white-space:pre-wrap}
.ai-meta{font-size:11px;color:var(--dim);margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.ai-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
.ai-btn:hover{opacity:.85;transform:translateY(-1px)}.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-src-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;margin-left:6px;background:#eef2ff;color:#4457b1;border:1px solid #d6dff7}
.ai-src-tag.warn{background:#fff7e6;color:#ad6800;border:1px solid #ffe0b2}
.ai-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;padding-top:6px}
.news-source{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:6px}
.news-source a{color:var(--blue);text-decoration:none;font-size:11px}
.news-source a:hover{text-decoration:underline}

.ai-key-wrap{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ai-key-wrap input{padding:3px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;width:200px}
@media(max-width:600px){
  .h{padding:10px 12px}.h h1{font-size:15px}
  .cards{grid-template-columns:repeat(2,1fr)}.crd .v{font-size:15px}
  .tab{padding:6px 10px;font-size:12px}table{font-size:12px}th,td{padding:7px 6px}
  .stock-rec{grid-template-columns:1fr}.chart-box{height:180px}
}
</style>
</head>
<body>
<div class="h">
  <h1>📊 盈亏看板</h1>
  <div class="r">
    <select id="src"><option value="tencent">腾讯行情</option><option value="manual">手动价格</option></select>
    <div id="upd" style="opacity:.8">加载中...</div>
    <button class="btn" onclick="refresh()">🔄</button>
  </div>
</div>
<div style="background:#1a1a2e;padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
  <span style="color:#aaa;font-size:11px">MiMo API Key:</span>
  <div class="ai-key-wrap">
    <input id="aiKey" type="password" placeholder="输入Key后点击AI分析" style="background:#2d2d44;color:#fff;border-color:#444">
    <button class="ai-btn" id="aiBtn" onclick="runAIAdvice()">AI 分析建议</button>
  </div>
  <span id="aiStatus" style="color:#888;font-size:11px"></span>
</div>
<div class="wrap">
  <div class="cards" id="sum"></div>
  <div id="remArea"></div>
  <div id="adviceArea"></div>
  
<div id="welcomeScreen" class="welcome">
  <h2>👋 欢迎使用 盈亏看板</h2>
  <p>股票、ETF 一手掌握，实时盈亏一目了然</p>
  <div class="steps">
    <div>📌 第一步：添加你持有的ETF基金</div>
    <div>📊 第二步：实时查看盈亏和行情</div>
    <div>🤖 第三步：获取AI智能投资建议</div>
  </div>
  <button class="big-btn" onclick="openAdd()">✨ 添加我的第一只持仓</button>
</div>
<div class="">
    <div class="tab on" data-t="hold">📋 持仓</div>
    <div class="tab" data-t="chart">📈 分时</div>
    <div class="tab" data-t="news">🔥 热点</div>
    <div class="tab" data-t="rec">⭐ 推荐</div>
    <div class="tab" data-t="cal">📅 日历</div>
    <div class="tab" data-t="net">🩺 诊断</div>
  </div>

  <div class="panel on" id="p-hold">
    <div class="card">
      <div class="card-h"><h2>📋 我的持仓</h2><button class="btn bp" onclick="openAdd()">＋ 添加ETF</button></div>
      <div style="overflow-x:auto"><table><thead><tr><th>名称</th><th>代码</th><th>份额</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏%</th><th>日涨跌%</th><th>当日盈亏</th><th>持仓日期</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table></div>
    </div>
  </div>

  <div class="panel" id="p-chart">
    <div id="chartArea"></div>
    <div id="chartNotice" style="margin:0 4px 8px;color:#8c8c8c;font-size:12px"></div>
  </div>

  <div class="panel" id="p-news">
    <div class="card">
      <div class="card-h"><h2>🔥 今日热点</h2><button class="btn btn-sm" onclick="loadNews()">刷新</button></div>
      <div style="padding:14px" id="newsBody"><div style="color:var(--dim);text-align:center;padding:20px">加载中...</div></div>
    </div>
    <div class="card">
      <div class="card-h"><h2>🏷️ 热门板块</h2></div>
      <div style="padding:14px" id="hotSectors"></div>
    </div>
  </div>

  <div class="panel" id="p-rec">
    <div class="card">
      <div class="card-h"><h2>⭐ 今日推荐关注</h2><button class="btn btn-sm" onclick="loadRec()">刷新</button></div>
      <div style="padding:14px" id="recBody"></div>
    </div>
  </div>

  <div class="panel" id="p-cal">
    <div class="card">
      <div class="card-h"><h2>📅 交易日历</h2><div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="calMo(-1)">◀</button><span id="calT"></span><button class="btn btn-sm" onclick="calMo(1)">▶</button></div></div>
      <div style="padding:12px"><div style="display:flex;gap:12px;margin-bottom:8px;font-size:11px"><span>🟢 开市</span><span>🔴 休市</span><span>🔵 美股</span></div><div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div></div>
    </div>
  </div>

  <div class="panel" id="p-net">
    <div class="card">
      <div class="card-h"><h2>🩺 网络诊断</h2><button class="btn btn-sm" onclick="runNetworkDiagnosis()">立即检测</button></div>
      <div style="padding:14px" id="netBody">
        <div style="color:var(--dim)">点击[立即检测]查看行情/资讯接口连通性。</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="showNetDiag()">打开诊断页</button>
          <button class="btn btn-sm" onclick="runNetworkDiagnosis()">重试检测</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="m">
  <div class="modal">
    <h3 id="mt">添加持仓</h3>
    <div class="fg"><label>名称</label><input id="fN" placeholder="如: 通信ETF国泰"></div>
    <div class="fg"><label>代码</label><input id="fC" placeholder="如: 515880"></div>
    <div class="fg"><label>份额</label><input id="fS" type="number" placeholder="如: 2600"></div>
    <div class="fg"><label>成本价</label><input id="fCo" type="number" step="0.001" placeholder="如: 0.839"></div>
    <div class="fg"><label>手动现价 (可选)</label><input id="fP" type="number" step="0.0001" placeholder="留空自动获取"></div>
    <div class="fg"><label>持仓日期</label><input id="fDate" type="date"></div>
    <div class="fg"><label>拆分倍数 (拆分后价格用, 默认1)</label><input id="fRatio" type="number" step="1" min="1" placeholder="默认1、1拆2填2"></div>
    <div class="mb"><button class="btn" onclick="closeM()">取消</button><button class="btn bp" onclick="saveIt()">保存</button></div>
  </div>
</div>

<script>
const D=[];
const _saved=localStorage.getItem('etf');
let H=_saved?JSON.parse(_saved):[];
let isFirstVisit=!_saved;
localStorage.removeItem('etf_h');localStorage.removeItem('etf_inv');
let src=localStorage.getItem('etf_src')||'tencent';
let editId=null,chartOn=true,calY,calM_,minCache={};
let lastSource='';
const $=id=>document.getElementById(id);
function sav(){localStorage.setItem('etf',JSON.stringify(H));}

function fetchJson(url,label,timeout){
  try{ $('aiStatus').textContent='正在读取 '+label+' 数据...'; }catch(e){}
  return fetch(url,{signal:AbortSignal.timeout(timeout||8000)}).then(async r=>{
    if(!r.ok){ try{$('aiStatus').textContent=label+' 数据获取失败';}catch(e){} return null; }
    try{ $('aiStatus').textContent=label+' 数据获取成功'; lastSource=label; }catch(e){}
    return await r.json();
  }).catch(err=>{
    if(String(err.name)==='TimeoutError' || String(err.message).includes('signal is aborted')){ try{$('aiStatus').textContent=label+' 请求超时';}catch(e){} }
    else if(String(err.message).includes('Failed to fetch') || String(err.message).includes('NetworkError')){ try{$('aiStatus').textContent=label+' 网络不可达';}catch(e){} }
    else { try{$('aiStatus').textContent=label+' 请求异常';}catch(e){} }
    return null;
  });
}
// Load saved API key
setTimeout(()=>{const sk=localStorage.getItem('mimo_key')||'';if(sk)$('aiKey').value=sk;$('aiKey').onchange=()=>{localStorage.setItem('mimo_key',$('aiKey').value);};},100);

// ==================== Calendar ====================
const CN_H=['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-01-31','2025-02-01','2025-02-02','2025-02-03','2025-02-04','2025-04-04','2025-04-05','2025-04-06','2025-05-01','2025-05-02','2025-05-03','2025-05-04','2025-05-05','2025-05-31','2025-06-01','2025-06-02','2025-10-01','2025-10-02','2025-10-03','2025-10-04','2025-10-05','2025-10-06','2025-10-07','2026-01-01','2026-01-02','2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-21','2026-02-22','2026-04-05','2026-04-06','2026-04-07','2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05','2026-06-19','2026-06-20','2026-06-21','2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07'];
const US_H=['2025-01-01','2025-01-20','2025-02-17','2025-04-18','2025-05-26','2025-06-19','2025-07-04','2025-09-01','2025-11-27','2025-12-25','2026-01-01','2026-01-19','2026-02-16','2026-04-03','2026-05-25','2026-06-19','2026-07-03','2026-09-07','2026-11-26','2026-12-25'];
function isWE(d){return d.getDay()===0||d.getDay()===6;}
function isCN(d){return!isWE(d)&&!CN_H.includes(d.toISOString().split('T')[0]);}
function isUS(d){return!isWE(d)&&!US_H.includes(d.toISOString().split('T')[0]);}

// ==================== Fetch: 不复权实时价 ====================
// 腾讯股票接口: qt.gtimg.cn 返回不复权实时价
async function fetchReal(code,ratio){
  for(const m of ['sz','sh']){
    try{
      const r=await fetch('https://qt.gtimg.cn/q='+m+code,{signal:AbortSignal.timeout(6000)});
      const txt=await r.text();
      // 格式: v_sz515880="1~通信ETF国泰~515880~0.790~0.789~...~20250704~..."
      const parts=txt.split('~');
      if(parts.length>3){
        let price=parseFloat(parts[3]);
        let prevClose=parseFloat(parts[4]);
        const name=parts[1];
        if(price>0){
          if(ratio&&ratio>1){price=price/ratio; if(prevClose>0) prevClose=prevClose/ratio;}
          return{price,name,prevClose};
        }
      }
    }catch(e){}
  }
  return{price:0,name:''};
}

// 日K线(前复权)用于图表
async function fetchKline(code){
  for(const m of ['sz','sh']){
    try{
      const r=await fetch('https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param='+m+code+',day,,,120,qfq',{signal:AbortSignal.timeout(6000)});
      const j=await r.json();
      const d=j.data&&j.data[m+code]&&j.data[m+code].day;
      if(d&&d.length)return d;
    }catch(e){}
  }
  return[];
}

// 分时数据
async function fetchMin(code){
  for(const m of ['sz','sh']){
    try{
      const r=await fetch('https://web.ifzq.gtimg.cn/appstock/app/minute/query?code='+m+code,{signal:AbortSignal.timeout(6000)});
      const j=await r.json();
      const raw=j.data&&j.data[m+code]&&j.data[m+code].data&&j.data[m+code].data.data;
      if(raw&&raw.length)return raw.map(x=>{const p=x.split(' ');return{t:p[0],v:+p[1],p:+p[2]};}).filter(x=>x.p>0);
    }catch(e){}
  }
  return[];
}

// ==================== News ====================
async function loadNews(){
  lastSource='';
  const el=$('newsBody');
  el.innerHTML='<div style="color:var(--dim);text-align:center;padding:20px">加载中...</div>';
  let items=[];let sourceLabel='';

  $('hotSectors').innerHTML='<span class="hot-tag r">半导体</span><span class="hot-tag o">新能源</span><span class="hot-tag">AI算力</span><span class="hot-tag g">消费</span><span class="hot-tag r">军工</span><span class="hot-tag">医药</span><span class="hot-tag o">光伏</span><span class="hot-tag">通信</span>';

  // 主源：新浪财经7x24
  try{
    const j=await fetchJson('https://zhibo.sina.com.cn/api/zhibo/feed?page=1&page_size=15&zhibo_id=152&tag_id=0&type=0','新浪财经7x24',8000);

async function loadMinChart(h){
  lastSource='';

  const cv=$('cv_'+h.id);if(!cv)return;
  if(!data.length){
    cv.parentElement.innerHTML='<div style="color:var(--dim);text-align:center;padding:40px">暂无分时数据（非交易时间或数据接口异常）</div>';

    return;
  }

  let ref=(h.prevClose>0)?h.prevClose:(data.length?data[0].p:0);
  if(ref<=0 && data.length) ref=data[0].p;

  const labels=data.map(d=>d.t);
  const price=data.map(d=>d.p);
  const vol=data.map(d=>d.v);
  const above=data.map(d=>d.p>=ref?d.p:null);
  const below=data.map(d=>d.p<ref?d.p:null);

  new Chart(cv.getContext('2d'),{
    type:'line',
    data:{labels,datasets:[
      {label:'上涨',data:above,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.08)',fill:true,tension:.25,pointRadius:0,borderWidth:1.6,yAxisID:'y',spanGaps:false},

      {label:'成交量',data:vol,type:'bar',backgroundColor:'rgba(114,46,209,.18)',yAxisID:'y1',barPercentage:.82,categoryPercentage:.92}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:12,filter:(item)=>item.datasetIndex<2}},
        tooltip:{callbacks:{label:(ctx)=>{
          if(ctx.datasetIndex===2) return '成交量:'+ctx.parsed.y;
          const priceVal=ctx.parsed.y; const chg=((priceVal/ref-1)*100).toFixed(2);
          return '价格:'+priceVal.toFixed(3)+' ('+(chg>=0?'+':'')+chg+'%)';
        }}}
      },
      scales:{x:{ticks:{maxTicksLimit:8,font:{size:9}}},y:{position:'left',ticks:{font:{size:9}}},y1:{position:'right',grid:{display:false},ticks:{font:{size:9},callback:v=>v>9999?(v/10000).toFixed(0)+'万':v}}}
    }
  });

  $('chartNotice').innerHTML='分时数据来源：腾讯分钟线接口（web.ifzq.gtimg.cn）';
  lastSource='腾讯分钟线';
}
function computeDailyPL(){
  let sum=0, valid=false, allPrev=true;
  H.forEach(h=>{
    if(!(h.p>0)) return;
    const ref=h.prevClose>0 ? h.prevClose : h.co;
    if(h.prevClose<=0) allPrev=false;
    if(ref>0){ sum+=(h.p-ref)*h.s; valid=true; }
  });
  const el=$('dailyPL');
  if(!el) return;
  if(!H.length){ el.innerHTML=''; return; }
  const cls=sum>=0?'up':'dn';
  const tip=allPrev && H.length ? '参照昨收' : '参照成本';
  const tipCls=allPrev && H.length ? 'var(--green)' : 'var(--amber)';
  el.innerHTML='<div class="crd"><div class="l">当日盈亏</div><div class="v '+cls+'">'+(sum>=0?'+':'')+sum.toFixed(2)+(valid?'':' · 参考值')+'</div><div style="font-size:11px;color:'+tipCls+';margin-top:4px">'+tip+'</div></div>';
}

  const today=new Date().toISOString().split('T')[0];
  let html='';
  for(let i=0;i<first.getDay();i++)html+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(calY,calM_,d),ds=dt.toISOString().split('T')[0];
    const cn=isCN(dt),us=isUS(dt);
    let bg=cn?'#dcfce7':us?'#dbeafe':'#fee2e2';
    let fg=cn?'var(--green)':us?'var(--blue)':'var(--red)';
    let icon=cn?'🟢':us?'🔵':'🔴';
    let br=ds===today?'2px solid var(--blue)':'none';
    html+='<div style="text-align:center;padding:6px 2px;border-radius:6px;font-size:11px;background:'+bg+';color:'+fg+';border:'+br+'">'+d+'<br>'+icon+'</div>';
  }
  $('calGrid').innerHTML=html;
}
function calMo(d){calM_+=d;if(calM_>11){calM_=0;calY++;}if(calM_<0){calM_=11;calY--;}renderCal();}

// ==================== Tabs ====================
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    t.classList.add('on');
    $('p-'+t.dataset.t).classList.add('on');
    if(t.dataset.t==='chart')renderCharts();
    if(t.dataset.t==='net' && typeof runNetworkDiagnosis==='function') runNetworkDiagnosis();
  };
});

// ==================== Modal ====================
function openAdd(){editId=null;$('mt').textContent='添加ETF';$('fN').value='';$('fC').value='';$('fS').value='';$('fCo').value='';$('fP').value='';$('fDate').value='';$('fRatio').value='';$('m').classList.add('show');}
function openE(id){const h=H.find(x=>x.id===id);if(!h)return;editId=id;$('mt').textContent='编辑ETF';$('fN').value=h.n;$('fC').value=h.c;$('fS').value=h.s;$('fCo').value=h.co;$('fP').value=h.p||'';$('fDate').value=h.date||'';$('fRatio').value=h.ratio||'';$('m').classList.add('show');}
function closeM(){$('m').classList.remove('show');}
function saveIt(){
  const n=$('fN').value.trim(),c=$('fC').value.trim(),s=+$('fS').value||0,co=+$('fCo').value||0,p=+$('fP').value||0,date=$('fDate').value||'',ratio=+$('fRatio').value||1;
  if(!n||!c){alert('名称和代码必填');return;}
  if(editId){const h=H.find(x=>x.id===editId);if(h){h.n=n;h.c=c;h.s=s;h.co=co;if(p>0)h.p=p;h.date=date;h.ratio=ratio>1?ratio:0;}}
  else{const mx=H.reduce((a,x)=>Math.max(a,x.id),0);H.push({id:mx+1,n,c,s,co,p,date,ratio:ratio>1?ratio:0});}
  sav();closeM();isFirstVisit=false;refresh();
}
function del(id){if(!confirm('确定删除？'))return;H=H.filter(h=>h.id!==id);sav();refresh();}

// ==================== Render ====================
function render(){
  const mv=H.reduce((a,h)=>a+(h.p>0?h.p*h.s:0),0);
  const pl=H.reduce((a,h)=>a+(h.p>0?(h.p-h.co)*h.s:0),0);
  $('sum').innerHTML=
    '<div class="crd"><div class="l">总市值</div><div class="v">'+mv.toFixed(2)+'</div></div>'+
    '<div class="crd"><div class="l">总盈亏</div><div class="v '+(pl>=0?'up':'dn')+'">'+(pl>=0?'+':'')+pl.toFixed(2)+'</div></div>'+
    '<div class="crd"><div class="l">持仓数</div><div class="v">'+H.length+'</div></div>'+
    '<div class="crd"><div class="l">盈亏比</div><div class="v">'+(mv>0?(pl/(mv-pl)*100).toFixed(1)+'%':'--')+'</div></div>';

  const today=new Date();const cnO=isCN(today),usO=isUS(today);
  const re=[];
  re.push(cnO?'🟢 A股今日开市':'🔴 A股今日休市');
  re.push(usO?'🟢 美股今日开市':'🔴 美股今日休市');
  $('remArea').innerHTML='<div class="rem '+(cnO?'rem-green':'rem-amber')+'">'+re.map(r=>'<div>'+r+'</div>').join('')+'</div>';

  $('tb').innerHTML=H.map(h=>{
    const mv2=h.p>0?h.p*h.s:0,pl2=h.p>0?(h.p-h.co)*h.s:0,pc=h.co>0?(h.p/h.co-1)*100:0;
    const cls=pl2>=0?'up':'dn';
    const hasPrev=h.prevClose>0 && h.p>0;
    const dpc=hasPrev?(h.p/h.prevClose-1)*100:0;
    const dpl=hasPrev?(h.p-h.prevClose)*h.s:0;
    const dcls=dpl>=0?'up':'dn';
    return '<tr><td><strong>'+h.n+'</strong></td><td style="color:var(--dim)">'+h.c+'</td><td>'+h.s+'</td><td>'+h.co.toFixed(3)+'</td><td>'+(h.p>0?h.p.toFixed(3):'--')+'</td><td>'+mv2.toFixed(2)+'</td><td class="'+cls+'">'+(pl2>=0?'+':'')+pl2.toFixed(2)+'</td><td class="'+cls+'">'+(pc>=0?'+':'')+pc.toFixed(2)+'%</td><td class="'+(hasPrev?dcls:'')+'">'+(hasPrev?((dpc>=0?'+':'')+dpc.toFixed(2)+'%'):'--')+'</td><td class="'+(hasPrev?dcls:'')+'">'+(hasPrev?((dpl>=0?'+':'')+dpl.toFixed(2)):'--')+'</td><td style="font-size:12px;color:var(--dim)">'+(h.date||"--")+'</td><td><button class="btn btn-sm" onclick="openE('+h.id+')">✏️</button> <button class="btn btn-sm" onclick="del('+h.id+')" style="color:var(--red)">✕</button></td></tr>';
  }).join('');

  renderAdvice();renderCal();computeDailyPL();
}

// ==================== Refresh ====================
async function refresh(){
  $('upd').textContent='获取中...';
  if(src==='tencent'){
    await Promise.all(H.map(async h=>{
      const res=await fetchReal(h.c,h.ratio);
      if(res.price>0)h.p=res.price;
      if(res.prevClose>0)h.prevClose=res.prevClose;
    }));
  }
  sav();render();
  $('upd').textContent=new Date().toLocaleTimeString();
}

// ==================== 14:30 Reminder ====================
function scheduleReminder(){
  const now=new Date(),target=new Date(now);
  target.setHours(14,30,0,0);if(now>target)target.setDate(target.getDate()+1);
  setTimeout(()=>{
    refresh();
    if('Notification'in window&&Notification.permission==='granted'){
      const msgs=H.filter(h=>h.p>0).map(h=>{const pc=(h.p/h.co-1)*100;return h.n+' '+(pc>=0?'+':'')+pc.toFixed(1)+'%';});
      new Notification('📊 14:30 操作提醒',{body:msgs.join('，')||'暂无持仓'});
    }
    scheduleReminder();
  },target-now);
}
if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();

// ==================== Source ====================
const ss=$('src');ss.value=src;
ss.onchange=()=>{src=ss.value;localStorage.setItem('etf_src',src);refresh();};

// ==================== Init ====================
refresh();loadNews();loadRec();scheduleReminder();
if(new URLSearchParams(location.search).get('widget')==='1')document.querySelector('.tab[data-t="hold"]').click();
</script>
